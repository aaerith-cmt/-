name: Daily Paper Digest

on:
  schedule:
    # 每天北京时间 10:00 (UTC 02:00)
    - cron: '0 2 * * *'
  # 也允许手动触发和 push 触发测试
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION_FOR_ACTIONS_CORE: node24

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pipeline
        env:
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline.py

      - name: Commit updated seen.json
        if: success()
        run: |
          git config user.name "paper-bot"
          git config user.email "bot@paper-collecter.local"
          git add state/seen.json digests/
          git diff --staged --quiet || git commit -m "🤖 daily digest $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
